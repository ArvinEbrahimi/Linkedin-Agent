services:
  api:
    build: .
    container_name: linkaid-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      ENV: production
      CHECKPOINT_DB_PATH: /app/data/checkpoints.db
      OUTREACH_LIMIT_DB_PATH: /app/data/outreach_limits.db
      DATABASE_URL: sqlite:////app/data/linkaid.db
      CHROMA_PERSIST_DIR: /app/data/chroma
    volumes:
      - linkaid-data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  ui:
    build: .
    container_name: linkaid-ui
    ports:
      - "8501:8501"
    environment:
      LINKAID_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    command: streamlit run app/ui/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    restart: unless-stopped

volumes:
  linkaid-data:
